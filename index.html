            i++;

            i++;

          if (expr[i] === "(") {

            i++;

          if (expr[i] === ")") {

            i++;

          for (const v of sorted) {
            if (expr.substr(i, v.length).toLowerCase() === v.toLowerCase()) {

              i += v.length;
              ok = true;
              break;

          if (!ok) i++;

        return toks;

            v &= this.fac();

            neg ^= 1;

            return v;
          }
          if (t.t === "V") {

            return this.m[t.n] ?? 0;
          }
          return 0;
        }
