<html lang="pl">

  <body>
    <div id="root"></div>
    <script>
      const { useState, useMemo } = React;

      // ==========================================
      // PARSER WYRAŻEŃ BOOLOWSKICH
      // ==========================================
      function lex(expr, names) {
        const sorted = [...names].sort((a, b) => b.length - a.length);
        const toks = [];
        let i = 0;
        while (i < expr.length) {
          if (/\s/.test(expr[i])) {
            i++;
            continue;
          }
          if (expr[i] === "+") {
            toks.push({ t: "OR" });
            i++;
            continue;
          }
          if ("*·".includes(expr[i])) {
            toks.push({ t: "AND" });
            i++;
            continue;
          }
          if ("'`".includes(expr[i])) {
            toks.push({ t: "NP" });
            i++;
            continue;
          }
          if ("!~".includes(expr[i])) {
            toks.push({ t: "PP" });
            i++;
            continue;
          }
          if (expr[i] === "(") {
            toks.push({ t: "LP" });
            i++;
            continue;
          }
          if (expr[i] === ")") {
            toks.push({ t: "RP" });
            i++;
            continue;
          }
          let ok = false;
          for (const v of sorted) {
            if (expr.substr(i, v.length).toLowerCase() === v.toLowerCase()) {
              toks.push({ t: "V", n: v.toLowerCase() });
              i += v.length;
              ok = true;
              break;
            }
          }
          if (!ok) i++;
        }
        return toks;
      }

      class BParser {
        constructor(toks, map) {
          this.toks = toks;
          this.i = 0;
          this.m = map;
        }
        p() {
          return this.toks[this.i];
        }
        e() {
          return this.toks[this.i++];
        }
        expr() {
          let v = this.term();
          while (this.p()?.t === "OR") {
            this.e();
            v |= this.term();
          }
          return v & 1;
        }
        term() {
          let v = this.fac();
          while (this.p()) {
            const t = this.p().t;
            if (t === "OR" || t === "RP") break;
            if (t === "AND") this.e();
            else if (t !== "V" && t !== "LP" && t !== "PP") break;
            v &= this.fac();
          }
          return v & 1;
        }
        fac() {
          let neg = 0;
          while (this.p()?.t === "PP") {
            this.e();
            neg ^= 1;
          }
          let v = this.atom();
          while (this.p()?.t === "NP") {
            this.e();
            neg ^= 1;
          }
          return neg ? v ^ 1 : v;
        }
        atom() {
          const t = this.p();
          if (!t) return 0;
          if (t.t === "LP") {
            this.e();
            const v = this.expr();
            if (this.p()?.t === "RP") this.e();
            return v;
          }
          if (t.t === "V") {
            this.e();
            return this.m[t.n] ?? 0;
          }
          return 0;
        }
      }

      function evalExpr(expr, vals, names) {
        try {
          const toks = lex(expr, names);
          const map = Object.fromEntries(
            names.map((n, i) => [n.toLowerCase(), vals[i]]),
          );
          return new BParser(toks, map).expr();
        } catch {
          return 0;
        }
      }

      // ==========================================
      // NAPRAWIONY ALGORYTM QUINE'A-McCLUSKEYA
      // ==========================================
      const d2b = (n, bits) => n.toString(2).padStart(bits, "0");

      function merge(a, b) {
        let d = 0,
          p = -1;
        for (let i = 0; i < a.length; i++) {
          if (a[i] === "-" && b[i] === "-") continue;
          if (a[i] === "-" || b[i] === "-") return null;
          if (a[i] !== b[i]) {
            if (++d > 1) return null;
            p = i;
          }
        }
        return d === 1 ? a.slice(0, p) + "-" + a.slice(p + 1) : null;
      }

      function runQMC(mts, dcs, n) {
        if (!mts.length)
          return { pis: [], steps: [], essential: [], optional: [], cover: [] };

        const all = [...new Set([...mts, ...dcs])];
        // POPRAWKA BUBEL: Każda komórka (nawet don't care) musi pamiętać swój własny numer mintermu przy fuzji!
        let tm = Object.fromEntries(all.map((m) => [d2b(m, n), [m]]));
        let cur = Object.keys(tm);
        const pis = [];

        for (let it = 0; it < 20; it++) {
          const used = new Set();
          const ntm = {};
          let any = false;

          for (let i = 0; i < cur.length; i++) {
            for (let j = i + 1; j < cur.length; j++) {
              const c = merge(cur[i], cur[j]);
              if (c !== null) {
                used.add(cur[i]);
                used.add(cur[j]);
                any = true;
                if (!ntm[c]) ntm[c] = [];
                [...(tm[cur[i]] || []), ...(tm[cur[j]] || [])].forEach((m) => {
                  if (!ntm[c].includes(m)) ntm[c].push(m);
                });
              }
            }
          }

          cur.forEach((t) => {
            if (!used.has(t) && !pis.find((p) => p.term === t)) {
              // Interesują nas tylko te komórki z grupy, które są faktycznymi celami optymalizacji (bez porzuconych X)
              const coveredMints = (tm[t] || []).filter((m) => mts.includes(m));
              pis.push({ term: t, allCells: tm[t] || [], mts: coveredMints });
            }
          });

          if (!any) break;
          Object.assign(tm, ntm);
          cur = Object.keys(ntm);
        }

        // ANALIZA KROKOWA DLA KORZYŚCI UŻYTKOWNIKA (Wyznaczanie Essential i Optional)
        const covCount = {};
        mts.forEach((m) => {
          covCount[m] = [];
        });
        pis.forEach((pi, idx) => {
          pi.mts.forEach((m) => {
            if (covCount[m]) covCount[m].push(idx);
          });
        });

        const essentialIndices = new Set();
        Object.entries(covCount).forEach(([m, arr]) => {
          if (arr.length === 1) essentialIndices.add(arr[0]);
        });

        const essential = [...essentialIndices].map((i) => pis[i]);
        const coveredByEssential = new Set();
        essential.forEach((p) =>
          p.mts.forEach((m) => coveredByEssential.add(m)),
        );

        const remMts = mts.filter((m) => !coveredByEssential.has(m));
        const optional = pis.filter(
          (_, i) =>
            !essentialIndices.has(i) && pis[i].mts.some((m) => mts.includes(m)),
        );

        // Wyznaczenie optymalnego pokrycia końcowego
        const selIndices = new Set(essentialIndices);
        const currentRem = new Set(remMts);

        while (currentRem.size > 0) {
          let bestIdx = -1;
          let bestCount = 0;
          pis.forEach((pi, i) => {
            if (!selIndices.has(i)) {
              const score = pi.mts.filter((m) => currentRem.has(m)).length;
              if (score > bestCount) {
                bestCount = score;
                bestIdx = i;
              }
            }
          });
          if (bestIdx === -1) break;
          selIndices.add(bestIdx);
          pis[bestIdx].mts.forEach((m) => currentRem.delete(m));
        }

        const cover = [...selIndices].map((i) => pis[i]);

        return { pis, essential, optional, cover };
      }

      // ==========================================
      // FORMATOWANIE WYRAŻEŃ
      // ==========================================
      const fmtSOP = (term, vs) =>
        [...term]
          .map((c, i) => (c === "1" ? vs[i] : c === "0" ? vs[i] + "'" : ""))
          .join("") || "1";
      const fmtPOS = (term, vs) => {
        const ts = [...term]
          .map((c, i) => (c === "0" ? vs[i] : c === "1" ? vs[i] + "'" : ""))
          .filter(Boolean);
        return ts.length ? "(" + ts.join("+") + ")" : "0";
      };
      const fmtMT = (m, n, vs) =>
        d2b(m, n)
          .split("")
          .map((b, i) => (b === "1" ? vs[i] : vs[i] + "'"))
          .join("");
      const fmtMX = (m, n, vs) =>
        "(" +
        d2b(m, n)
          .split("")
          .map((b, i) => (b === "0" ? vs[i] : vs[i] + "'"))
          .join("+") +
        ")";

      // ==========================================
      // MAPA KARNAUGH (STRUKTURA I INDEKSY)
      // ==========================================
      const G4 = [0, 1, 3, 2];
      const G8 = [0, 1, 3, 2, 6, 7, 5, 4];
      function kCells(n) {
        if (n === 2)
          return [
            [0, 1],
            [2, 3],
          ].map((row, ri) => row.map((m, ci) => ({ ri, ci, m })));
        if (n === 3)
          return Array.from({ length: 2 }, (_, ri) =>
            G4.map((g, ci) => ({ ri, ci, m: ri * 4 + g })),
          );
        if (n === 4)
          return Array.from({ length: 4 }, (_, ri) =>
            G4.map((g, ci) => ({ ri, ci, m: G4[ri] * 4 + G4[ci] })),
          );
        if (n === 5)
          return Array.from({ length: 4 }, (_, ri) =>
            G8.map((g, ci) => ({ ri, ci, m: G4[ri] * 8 + G8[ci] })),
          );
        return Array.from({ length: 8 }, (_, ri) =>
          G8.map((g, ci) => ({ ri, ci, m: G8[ri] * 8 + G8[ci] })),
        );
      }

      const GRP_CLR = [
        "#ef4444",
        "#22c55e",
        "#3b82f6",
        "#f59e0b",
        "#a855f7",
        "#06b6d4",
        "#ec4899",
        "#14b8a6",
      ];
      const GRP_BG = [
        "rgba(239, 68, 68, 0.15)",
        "rgba(34, 197, 94, 0.15)",
        "rgba(59, 82, 246, 0.15)",
        "rgba(245, 158, 20, 0.15)",
        "rgba(168, 85, 247, 0.15)",
        "rgba(6, 182, 212, 0.15)",
        "rgba(236, 72, 153, 0.15)",
        "rgba(20, 184, 166, 0.15)",
      ];

      function KMap({ n, vs, outs, cover, onCellClick, optimizeTarget }) {
        const cells = useMemo(() => kCells(n), [n]);
        const colorMap = useMemo(() => {
          const m = {};
          cover.forEach((pi, i) => {
            pi.allCells.forEach((cell) => {
              (m[cell] = m[cell] || []).push(i);
            });
          });
          return m;
        }, [cover, n]);

        const rLbls =
          n <= 3
            ? ["0", "1"]
            : n <= 5
              ? ["00", "01", "11", "10"]
              : ["000", "001", "011", "010", "110", "111", "101", "100"];
        const cLbls =
          n === 2
            ? ["0", "1"]
            : n <= 4
              ? ["00", "01", "11", "10"]
              : ["000", "001", "011", "010", "110", "111", "101", "100"];
        const rVar =
          n === 2
            ? vs[0]
            : n === 3
              ? vs[0]
              : n <= 5
                ? `${vs[0]}${vs[1]}`
                : `${vs[0]}${vs[1]}${vs[2]}`;
        const cVar =
          n === 2
            ? vs[1]
            : n === 3
              ? `${vs[1]}${vs[2]}`
              : n === 4
                ? `${vs[2]}${vs[3]}`
                : n === 5
                  ? `${vs[2]}${vs[3]}${vs[4]}`
                  : `${vs[3]}${vs[4]}${vs[5]}`;

        return React.createElement(
          "div",
          null,
          React.createElement(
            "div",
            { style: { overflowX: "auto" } },
            React.createElement(
              "table",
              {
                style: {
                  borderCollapse: "collapse",
                  margin: "16px auto",
                  fontFamily: "monospace",
                },
              },
              React.createElement(
                "thead",
                null,
                React.createElement(
                  "tr",
                  null,
                  React.createElement(
                    "td",
                    {
                      style: {
                        padding: "8px 16px",
                        color: "#64748b",
                        fontSize: 13,
                        textAlign: "center",
                        borderBottom: "2px solid #cbd5e1",
                        borderRight: "2px solid #cbd5e1",
                      },
                    },
                    React.createElement("strong", null, rVar),
                    " \\ ",
                    React.createElement("strong", null, cVar),
                  ),
                  cLbls.map((l) =>
                    React.createElement(
                      "th",
                      {
                        key: l,
                        style: {
                          padding: "8px 16px",
                          textAlign: "center",
                          fontSize: 14,
                          fontWeight: 700,
                          color: "#334155",
                          borderBottom: "2px solid #cbd5e1",
                        },
                      },
                      l,
                    ),
                  ),
                ),
              ),
              React.createElement(
                "tbody",
                null,
                cells.map((row, ri) =>
                  React.createElement(
                    "tr",
                    { key: ri },
                    React.createElement(
                      "td",
                      {
                        style: {
                          padding: "8px 16px",
                          fontWeight: 700,
                          fontSize: 14,
                          color: "#334155",
                          textAlign: "center",
                          borderRight: "2px solid #cbd5e1",
                        },
                      },
                      rLbls[ri],
                    ),
                    row.map(({ m }) => {
                      const idxs = colorMap[m] || [];
                      const val = outs[m];
                      let bg = "white";
                      if (val === 1) bg = "#f0fdf4";
                      else if (val === "x") bg = "#faf5ff";
                      else bg = "#fff5f5";

                      let boxShadow = "none";
                      let border = "1px solid #cbd5e1";

                      if (idxs.length > 0) {
                        bg = GRP_BG[idxs[0] % GRP_BG.length];
                        boxShadow = idxs
                          .map(
                            (idx) =>
                              `inset 0 0 0 3px ${GRP_CLR[idx % GRP_CLR.length]}`,
                          )
                          .join(", ");
                        border = `1px solid ${GRP_CLR[idxs[0] % GRP_CLR.length]}`;
                      }

                      return React.createElement(
                        "td",
                        {
                          key: m,
                          onClick: () => onCellClick && onCellClick(m),
                          style: {
                            width: 65,
                            height: 65,
                            textAlign: "center",
                            verticalAlign: "middle",
                            background: bg,
                            border: border,
                            boxShadow: boxShadow,
                            position: "relative",
                            cursor: onCellClick ? "pointer" : "default",
                          },
                        },
                        React.createElement(
                          "span",
                          {
                            style: {
                              position: "absolute",
                              top: 3,
                              left: 5,
                              fontSize: 10,
                              color: "#94a3b8",
                            },
                          },
                          m,
                        ),
                        React.createElement(
                          "span",
                          {
                            style: {
                              fontSize: 22,
                              fontWeight: 800,
                              color:
                                val === 1
                                  ? "#16a34a"
                                  : val === "x"
                                    ? "#7c3aed"
                                    : "#dc2626",
                            },
                          },
                          String(val),
                        ),
                      );
                    }),
                  ),
                ),
              ),
            ),
          ),
        );
      }

      // ==========================================
      // NOWY KOMPONENT: KROKOWY OPIS BRAMKOWY
      // ==========================================
      function ProcessLogger({ qmcResult, vs, optimizeTarget }) {
        const { pis, essential, optional, cover } = qmcResult;
        const targetName =
          optimizeTarget === "1" ? "JEDYNEK (SOP)" : "ZER (POS)";
        const formatTerm = (t) =>
          optimizeTarget === "1" ? fmtSOP(t, vs) : fmtPOS(t, vs);

        return React.createElement(
          "div",
          {
            style: {
              marginTop: 24,
              padding: 18,
              background: "#f8fafc",
              borderRadius: 10,
              border: "2px solid #e2e8f0",
            },
          },
          React.createElement(
            "h3",
            { style: { color: "#1e3a8a", margin: "0 0 12px 0", fontSize: 16 } },
            `📝 PROCEDURA SPISYWANIA I MINIMALIZACJI DLA ${targetName}`,
          ),

          React.createElement(
            "div",
            { style: { marginBottom: 14 } },
            React.createElement(
              "strong",
              null,
              "Krok 1: Wyznaczenie wszystkich grup maksymalnych (Implikanty prymarne):",
            ),
            React.createElement(
              "ul",
              { style: { margin: "6px 0", paddingLeft: 20, fontSize: 13 } },
              pis.map((p, i) =>
                React.createElement(
                  "li",
                  {
                    key: i,
                    style: { fontFamily: "monospace", marginBottom: 3 },
                  },
                  `Grupa [${formatTerm(p.term)}] → Maska: ${p.term} | Obejmuje komórki: [${p.allCells.join(", ")}]`,
                ),
              ),
            ),
          ),

          React.createElement(
            "div",
            { style: { marginBottom: 14 } },
            React.createElement(
              "strong",
              null,
              "Krok 2: Znalezienie grup niezbędnych (Essential Prime Implicants):",
            ),
            React.createElement(
              "p",
              { style: { margin: "4px 0", fontSize: 13, color: "#475569" } },
              "Są to grupy, które jako jedyne pokrywają co najmniej jeden wymagany stan bazowy.",
            ),
            essential.length === 0
              ? React.createElement(
                  "div",
                  {
                    style: {
                      color: "#b45309",
                      fontSize: 13,
                      fontWeight: "bold",
                    },
                  },
                  "Brak wyraźnych grup niezbędnych. Wybór będzie oparty na minimalizacji pokrycia.",
                )
              : React.createElement(
                  "ul",
                  {
                    style: {
                      margin: "6px 0",
                      paddingLeft: 20,
                      fontSize: 13,
                      color: "#16a34a",
                    },
                  },
                  essential.map((p, i) =>
                    React.createElement(
                      "li",
                      { key: i, style: { fontFamily: "monospace" } },
                      `WYBRANA (Niezbędna): [${formatTerm(p.term)}] ponieważ samodzielnie zabezpiecza stany.`,
                    ),
                  ),
                ),
          ),

          React.createElement(
            "div",
            { style: { marginBottom: 14 } },
            React.createElement(
              "strong",
              null,
              "Krok 3: Analiza grup opcjonalnych / uzupełniających:",
            ),
            optional.length === 0
              ? React.createElement(
                  "div",
                  { style: { fontSize: 13, color: "#64748b" } },
                  "Brak dodatkowych grup (Wszystkie stany zostały już optymalnie nakryte).",
                )
              : React.createElement(
                  "ul",
                  {
                    style: {
                      margin: "6px 0",
                      paddingLeft: 20,
                      fontSize: 13,
                      color: "#475569",
                    },
                  },
                  optional.map((p, i) => {
                    const isSelected = cover.some((c) => c.term === p.term);
                    return React.createElement(
                      "li",
                      {
                        key: i,
                        style: {
                          fontFamily: "monospace",
                          textDecoration: isSelected ? "none" : "line-through",
                          opacity: isSelected ? 1 : 0.5,
                        },
                      },
                      isSelected
                        ? `[Użyta jako dopełnienie] → Obejmuje: [${p.mts.join(", ")}]`
                        : `[Odrzucona - nadmiarowa] → Obejmuje: [${p.mts.join(", ")}]`,
                    );
                  }),
                ),
          ),
          React.createElement("hr", {
            style: {
              border: "none",
              borderTop: "1px solid #cbd5e1",
              margin: "12px 0",
            },
          }),
          React.createElement(
            "div",
            null,
            React.createElement(
              "strong",
              null,
              "Krok 4: Postać końcowa funkcji po syntezie logicznej:",
            ),
            React.createElement(
              "div",
              {
                style: {
                  fontFamily: "monospace",
                  fontSize: 16,
                  color: "#1e40af",
                  marginTop: 6,
                  background: "#eff6ff",
                  padding: 10,
                  borderRadius: 6,
                  fontWeight: "bold",
                },
              },
              optimizeTarget === "1"
                ? "f = " +
                    (cover.map((p) => formatTerm(p.term)).join(" + ") || "0")
                : "f = " +
                    (cover.map((p) => formatTerm(p.term)).join(" · ") || "1"),
            ),
          ),
        );
      }

      // ==========================================
      // SCHEMAT BRAMKOWY (SVG)
      // ==========================================
      function Gates({ cover, vs, type, structType }) {
        if (!cover.length)
          return React.createElement(
            "div",
            { style: { padding: 24, color: "#94a3b8", textAlign: "center" } },
            "Brak danych do schematu.",
          );
        const isPOS = structType === "pos";
        const terms = cover.map((pi) => {
          const lits = [...pi.term]
            .map((c, i) => {
              if (c === "-") return null;
              return isPOS
                ? { v: vs[i], vi: i, neg: c === "1" }
                : { v: vs[i], vi: i, neg: c === "0" };
            })
            .filter(Boolean);
          return {
            lits,
            outLabel: isPOS ? fmtPOS(pi.term, vs) : fmtSOP(pi.term, vs),
          };
        });

        const needsInv = new Set();
        terms.forEach((t) =>
          t.lits.forEach((l) => {
            if (l.neg) needsInv.add(l.vi);
          }),
        );

        const GW = 68,
          GH = 38,
          INV_W = 34,
          INV_H = 24,
          dotR = 6;
        const X_LBL = 18,
          X_INV = 60,
          X1 = X_INV + INV_W + 90,
          X2 = X1 + GW + 140;
        const NV = vs.length,
          NR = terms.length;
        const VAR_SPACING = Math.max(44, Math.min(60, 320 / Math.max(NV, 1)));
        const VGAP = Math.max(68, Math.min(90, 380 / Math.max(NR, 1)));

        const varY = Array.from({ length: NV }, (_, i) => 30 + i * VAR_SPACING);
        const rowY = terms.map((_, i) => 30 + i * VGAP);
        const SVG_H = Math.max(NV * VAR_SPACING + 60, NR * VGAP + 60, 200);
        const outY = SVG_H / 2 - GH / 2;

        let n1 = isPOS ? "OR" : "AND",
          n2 = isPOS ? "AND" : "OR";
        let hasDotFirst = false,
          hasDotSecond = false;

        if (type === "nand") {
          n1 = "NAND";
          n2 = isPOS ? "AND" : "NAND";
          hasDotFirst = true;
          hasDotSecond = !isPOS;
        } else if (type === "nor") {
          n1 = "NOR";
          n2 = isPOS ? "NOR" : "OR";
          hasDotFirst = true;
          hasDotSecond = isPOS;
        }

        const els = [];
        let uid = 0;
        const k = () => uid++;

        vs.forEach((v, i) => {
          const cy = varY[i] + INV_H / 2;
          els.push(
            React.createElement(
              "text",
              {
                key: k(),
                x: X_LBL,
                y: cy + 5,
                fontSize: 14,
                fontFamily: "serif",
                fontWeight: "700",
              },
              v,
            ),
          );
          if (needsInv.has(i)) {
            els.push(
              React.createElement("line", {
                key: k(),
                x1: X_LBL + 16,
                y1: cy,
                x2: X_INV,
                y2: cy,
                stroke: "#475569",
              }),
            );
            els.push(
              React.createElement("rect", {
                key: k(),
                x: X_INV,
                y: varY[i],
                width: INV_W,
                height: INV_H,
                rx: 4,
                fill: "#fce7f3",
                stroke: "#db2777",
              }),
            );
            els.push(
              React.createElement(
                "text",
                {
                  key: k(),
                  x: X_INV + INV_W / 2,
                  y: varY[i] + INV_H / 2 + 3,
                  textAnchor: "middle",
                  fontSize: 8,
                  fontWeight: "700",
                },
                "NOT",
              ),
            );
            els.push(
              React.createElement("circle", {
                key: k(),
                cx: X_INV + INV_W + 5,
                cy: cy,
                r: 5,
                fill: "white",
                stroke: "#db2777",
              }),
            );
          } else {
            els.push(
              React.createElement("line", {
                key: k(),
                x1: X_LBL + 16,
                y1: cy,
                x2: X_INV + INV_W + 14,
                y2: cy,
                stroke: "#475569",
                strokeDasharray: "4 2",
              }),
            );
          }
        });

        terms.forEach((term, ti) => {
          const gx = X1,
            gy = rowY[ti],
            nin = Math.max(term.lits.length, 1),
            centerY = gy + GH / 2;
          els.push(
            React.createElement("rect", {
              key: k(),
              x: gx,
              y: gy,
              width: GW,
              height: GH,
              rx: 6,
              fill: "#dbeafe",
              stroke: "#3b82f6",
              strokeWidth: 2,
            }),
          );
          els.push(
            React.createElement(
              "text",
              {
                key: k(),
                x: gx + GW / 2,
                y: gy + GH / 2 + 5,
                textAnchor: "middle",
                fontSize: 11,
                fontWeight: "700",
              },
              n1,
            ),
          );
          if (hasDotFirst)
            els.push(
              React.createElement("circle", {
                key: k(),
                cx: gx + GW + dotR,
                cy: centerY,
                r: dotR,
                fill: "white",
                stroke: "#3b82f6",
              }),
            );

          term.lits.forEach((lit, li) => {
            const wy = gy + (GH * (li + 1)) / (nin + 1);
            els.push(
              React.createElement("line", {
                key: k(),
                x1: gx - 45,
                y1: wy,
                x2: gx,
                y2: wy,
                stroke: "#475569",
              }),
            );
          });

          const outX = hasDotFirst ? gx + GW + dotR * 2 + 2 : gx + GW;
          const inY = outY + (GH * (ti + 1)) / (NR + 1);
          els.push(
            React.createElement("path", {
              key: k(),
              d: `M${outX},${centerY} H${outX + 20} V${inY} H${X2}`,
              stroke: "#64748b",
              fill: "none",
            }),
          );
        });

        els.push(
          React.createElement("rect", {
            key: k(),
            x: X2,
            y: outY,
            width: GW,
            height: GH,
            rx: 6,
            fill: "#fef3c7",
            stroke: "#d97706",
            strokeWidth: 2,
          }),
        );
        els.push(
          React.createElement(
            "text",
            {
              key: k(),
              x: X2 + GW / 2,
              y: outY + GH / 2 + 5,
              textAnchor: "middle",
              fontSize: 11,
              fontWeight: "700",
            },
            n2,
          ),
        );

        const fX = X2 + GW + 10;
        els.push(
          React.createElement(
            "text",
            {
              key: k(),
              x: fX + 15,
              y: outY + GH / 2 + 6,
              fontSize: 18,
              fontWeight: "bold",
              fill: "#15803d",
            },
            "f",
          ),
        );

        return React.createElement(
          "div",
          { style: { overflowX: "auto" } },
          React.createElement("svg", { width: fX + 50, height: SVG_H }, els),
        );
      }

      // ==========================================
      // GŁÓWNY PANEL APLIKACJI (APP)
      // ==========================================
      function App() {
        const [nv, setNv] = useState(4);
        const [names, setNames] = useState([
          "x1",
          "x2",
          "x3",
          "x4",
          "x5",
          "x6",
        ]);
        const [mode, setMode] = useState("km");
        const [expr, setExpr] = useState("");
        const [ttIn, setTtIn] = useState({});
        // PRESET DANYCH Z TWOJEGO SCREENSHOTU (błąd narożnika 0,1,2,4,8,10,14,15):
        const [kmIn, setKmIn] = useState({
          0: "x",
          1: 1,
          2: 1,
          4: 1,
          8: 1,
          10: 1,
          14: 1,
          15: 1,
        });
        const [mtStr, setMtStr] = useState("");
        const [mxStr, setMxStr] = useState("");
        const [dcStr, setDcStr] = useState("");
        const [tab, setTab] = useState("km");

        const [gtype, setGtype] = useState("and-or");
        const [optimizeTarget, setOptimizeTarget] = useState("1");
        const [structType, setStructType] = useState("sop");

        const vs = useMemo(() => names.slice(0, nv), [names, nv]);

        const comp = useMemo(() => {
          const rows = 1 << nv;
          const outs = Array(rows).fill(0);

          if (mode === "km") {
            for (let i = 0; i < rows; i++) outs[i] = kmIn[i] ?? 0;
          } else if (mode === "mt") {
            const mts = mtStr
              .split(/[\s,]+/)
              .map(Number)
              .filter((x) => !isNaN(x) && x >= 0 && x < rows);
            const dcs = dcStr
              .split(/[\s,]+/)
              .map(Number)
              .filter((x) => !isNaN(x) && x >= 0 && x < rows);
            for (let i = 0; i < rows; i++)
              outs[i] = dcs.includes(i) ? "x" : mts.includes(i) ? 1 : 0;
          } else if (mode === "tt") {
            for (let i = 0; i < rows; i++) outs[i] = ttIn[i] ?? 0;
          }

          const mts = [],
            mxs = [],
            dontC = [];
          outs.forEach((v, i) => {
            if (v === 1) mts.push(i);
            else if (v === 0) mxs.push(i);
            else dontC.push(i);
          });
          return { outs, mts, mxs, dontC };
        }, [nv, mode, kmIn, mtStr, dcStr, ttIn]);

        const sopR = useMemo(
          () => runQMC(comp.mts, comp.dontC, nv),
          [comp.mts, comp.dontC, nv],
        );
        const posR = useMemo(
          () => runQMC(comp.mxs, comp.dontC, nv),
          [comp.mxs, comp.dontC, nv],
        );

        const activeQmc = optimizeTarget === "1" ? sopR : posR;

        return React.createElement(
          "div",
          { style: { maxWidth: 960, margin: "20px auto", padding: 16 } },
          React.createElement(
            "div",
            {
              style: {
                background: "#1e40af",
                color: "white",
                padding: 20,
                borderRadius: 12,
                marginBottom: 16,
              },
            },
            React.createElement(
              "h2",
              { style: { margin: 0 } },
              "Bool Kombajn — Poprawiony",
            ),
            React.createElement(
              "p",
              { style: { margin: "4px 0 0 0", fontSize: 12, opacity: 0.8 } },
              "Poprawiono fuzję stanów Don't Care dla prawidłowego wyznaczania pętli i narożników.",
            ),
          ),

          React.createElement(
            "div",
            {
              style: {
                background: "white",
                padding: 16,
                borderRadius: 10,
                marginBottom: 16,
                boxShadow: "0 2px 8px rgba(0,0,0,0.05)",
              },
            },
            React.createElement(
              "label",
              { style: { fontWeight: "bold", marginRight: 10 } },
              "Liczba zmiennych: ",
            ),
            React.createElement(
              "select",
              {
                value: nv,
                onChange: (e) => setNv(+e.target.value),
                style: { padding: 6, borderRadius: 4 },
              },
              [2, 3, 4, 5].map((x) =>
                React.createElement("option", { key: x, value: x }, x),
              ),
            ),

            React.createElement(
              "label",
              {
                style: { fontWeight: "bold", marginLeft: 20, marginRight: 10 },
              },
              "Kryterium Mapy: ",
            ),
            React.createElement(
              "select",
              {
                value: optimizeTarget,
                onChange: (e) => setOptimizeTarget(e.target.value),
                style: { padding: 6, borderRadius: 4 },
              },
              React.createElement(
                "option",
                { value: "1" },
                "Grupuj jedynki (SOP)",
              ),
              React.createElement(
                "option",
                { value: "0" },
                "Grupuj zera (POS)",
              ),
            ),
          ),

          React.createElement(
            "div",
            {
              style: {
                background: "white",
                padding: 20,
                borderRadius: 10,
                border: "1px solid #cbd5e1",
              },
            },
            React.createElement(KMap, {
              n: nv,
              vs: vs,
              outs: comp.outs,
              cover: activeQmc.cover,
              optimizeTarget: optimizeTarget,
              onCellClick: (m) =>
                setKmIn((p) => {
                  const c = p[m] ?? 0;
                  return { ...p, [m]: c === 0 ? 1 : c === 1 ? "x" : 0 };
                }),
            }),

            React.createElement(ProcessLogger, {
              qmcResult: activeQmc,
              vs: vs,
              optimizeTarget: optimizeTarget,
            }),
          ),
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        React.createElement(App),
      );
    </script>
  </body>
</html>
